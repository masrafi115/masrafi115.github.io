############################
# Widgets
############################
[[params.widgets.homepage]]
type = "search"

[[params.widgets.homepage]]
type = "archives"
[params.widgets.homepage.params]
limit = 5

[[params.widgets.homepage]]
type = "categories"
[params.widgets.homepage.params]
limit = 10

[[params.widgets.homepage]]
type = "tag-cloud"
[params.widgets.homepage.params]
limit = 10

[[params.widgets.page]]
type = "toc"

############################
# OpenGraph
############################
[params.opengraph.twitter]
site = ""
card = "summary_large_image"

[params.defaultImage.opengraph]
enabled = false
local = false
src = ""

############################
# Color scheme
############################
[params.colorScheme]
toggle = true
default = "auto"

############################
# Image processing
############################
[params.imageProcessing.cover]
