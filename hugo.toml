baseurl = "https://masrafi115.githu.io/"
languageCode = "en"
# theme: hugo-theme-stack
title = "masrafi's Blog"
theme = 'maverick'  
[languages.en]
languageName = "English"
title = "masrafi's Blog"
weight = 2

[languages.en.params.sidebar]
subtitle = "Hello! This is masrafi's blog where I share my technical experiences."


############################
# Services
############################
[services.disqus]
shortname = "hugo-theme-stack"

[services.googleAnalytics]
id = ""

############################
# Pagination
############################
[pagination]
pagerSize = 3

############################
# Permalinks
############################
[permalinks]
post = "/p/:slug/"
page = "/:slug/"

############################
# Params
############################
[params]
mainSections = ["post"]
featuredImageField = "image"
rssFullContent = true
favicon = "/favicon.png"

############################
# Footer
############################
[params.footer]
since = 2024
customText = ""

############################
# Date format
############################
[params.dateFormat]
published = "Jan 02, 2006"
lastUpdated = "Jan 02, 2006"

############################
# Sidebar
############################
[params.sidebar]
emoji = "🫠"
subtitle = "No stopping!"

[params.sidebar.avatar]
enabled = true
local = true
src = "img/avatar.png"

############################
# Article
############################
[params.article]
math = false
toc = true
readingTime = true

[params.article.license]
enabled = true
default = "Licensed under CC BY-NC-SA 4.0"

############################
# Comments
############################
[params.comments]
